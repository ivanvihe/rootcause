# RootCause Prometheus alert rules.
#
# This file ships EMPTY on purpose — RootCause is meant to start with no rules
# so you can add only the ones that match your environment.
#
# Two ways to add rules:
#   1. Write Prometheus alerting rules here by hand (see the example below).
#   2. Define checks in checks.json and generate rules from them with
#        python tools/migrate_checks_to_rules.py
#
# Each alert should carry a `rootcause_check` label so RootCause can correlate
# the firing alert with a remediation rule in checks.json.
#
# groups:
#   - name: rootcause
#     rules:
#       - alert: disk_root
#         expr: (1 - node_filesystem_avail_bytes{mountpoint="/",fstype!~"tmpfs|overlay|squashfs"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 > 90
#         for: 2m
#         labels:
#           severity: "warning"
#           rootcause_check: "disk_root"
#         annotations:
#           summary: "Root disk usage below 90%"
groups: []
