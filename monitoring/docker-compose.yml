name: rootcause-monitoring

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: rootcause-prometheus
    restart: unless-stopped
    network_mode: host
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.listen-address=127.0.0.1:9090
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus

  node-exporter:
    image: prom/node-exporter:latest
    container_name: rootcause-node-exporter
    restart: unless-stopped
    network_mode: host
    pid: host
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/host/root
      - --web.listen-address=:9100
      - --collector.logind
      - --collector.systemd
      - --collector.processes
      - --collector.textfile.directory=/textfile
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|run/credentials/.+|var/lib/docker/.+)($$|/)
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro,rslave
      - /run/dbus/system_bus_socket:/run/dbus/system_bus_socket:ro
      - /run/systemd:/run/systemd:ro
      # RootCause shell/SSH checks land here (written by monitoring/textfile/collect.sh
      # via host cron) and surface as rootcause_check_success{check,host}.
      - /var/lib/node_exporter/textfile:/textfile:ro

  grafana:
    image: grafana/grafana:latest
    container_name: rootcause-grafana
    restart: unless-stopped
    network_mode: host
    depends_on:
      - prometheus
    environment:
      # Bound to all interfaces so the embedded "Metrics" tab works whether
      # RootCause is opened on localhost or over the private LAN. Anonymous access
      # is intentional (private network, no external exposure).
      GF_SERVER_HTTP_ADDR: 0.0.0.0
      GF_SERVER_HTTP_PORT: "3000"
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-rootcause}
      # Private LAN: fully anonymous access, no login wall at all.
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_AUTH_BASIC_ENABLED: "false"
      GF_USERS_DEFAULT_THEME: dark
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_NEWS_NEWS_FEED_ENABLED: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana

  # GPU metrics (temperature, utilization, memory) via nvidia-smi.
  # Requires the NVIDIA Container Toolkit on the host:
  #   sudo pacman -S nvidia-container-toolkit && sudo nvidia-ctk runtime configure --runtime=docker && sudo systemctl restart docker
  nvidia-exporter:
    image: utkuozdemir/nvidia_gpu_exporter:1.3.2
    container_name: rootcause-nvidia-exporter
    restart: unless-stopped
    network_mode: host
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: utility
    command:
      - --web.listen-address=:9835

  # Routes Prometheus alerts back into RootCause's unified problem store via the
  # webhook receiver (POST /api/ingest/alertmanager). This is the push path of
  # the "RootCause as frontend" redesign: detection lives here, remediation in RootCause.
  alertmanager:
    image: prom/alertmanager:latest
    container_name: rootcause-alertmanager
    restart: unless-stopped
    network_mode: host
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --web.listen-address=127.0.0.1:9093
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager

  # Probes HTTP/TCP/ICMP/TLS targets and exposes probe_success etc. Replaces the
  # native http/network_ping/cert checks; Prometheus alert rules fire on its metrics.
  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: rootcause-blackbox-exporter
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_RAW          # required for the icmp prober (internet_stability)
    command:
      - --config.file=/etc/blackbox/blackbox.yml
      - --web.listen-address=:9115
    volumes:
      - ./blackbox/blackbox.yml:/etc/blackbox/blackbox.yml:ro

  # NOTE: shell/SSH command checks (containers_health, jellyfin_transcode,
  # wireguard_vpn, ssl_certificates) are NOT run by a script exporter — they need
  # the host's docker socket and SSH key, so monitoring/textfile/collect.sh runs
  # them via host cron and writes node-exporter textfile metrics instead. See
  # monitoring/textfile/README.

  # ── Zabbix (example datasource for RootCause) ──────────────────────────────────
  # A self-contained Zabbix monitoring this host, used as a Zabbix datasource in
  # RootCause to author/test rules. On its own bridge network; the web/API is
  # published on 127.0.0.1:8080 (add http://127.0.0.1:8080 as a Zabbix datasource).
  zabbix-db:
    image: postgres:16-alpine
    container_name: rootcause-zabbix-db
    restart: unless-stopped
    networks: [zabbix-net]
    environment:
      POSTGRES_USER: zabbix
      POSTGRES_PASSWORD: zabbix
      POSTGRES_DB: zabbix
    volumes:
      - zabbix_db:/var/lib/postgresql/data

  zabbix-server:
    image: zabbix/zabbix-server-pgsql:alpine-7.0-latest
    container_name: rootcause-zabbix-server
    restart: unless-stopped
    depends_on: [zabbix-db]
    networks: [zabbix-net]
    ports:
      - "127.0.0.1:10051:10051"
    environment:
      DB_SERVER_HOST: zabbix-db
      POSTGRES_USER: zabbix
      POSTGRES_PASSWORD: zabbix
      POSTGRES_DB: zabbix

  zabbix-web:
    image: zabbix/zabbix-web-nginx-pgsql:alpine-7.0-latest
    container_name: rootcause-zabbix-web
    restart: unless-stopped
    depends_on: [zabbix-server, zabbix-db]
    networks: [zabbix-net]
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      ZBX_SERVER_HOST: zabbix-server
      DB_SERVER_HOST: zabbix-db
      POSTGRES_USER: zabbix
      POSTGRES_PASSWORD: zabbix
      POSTGRES_DB: zabbix
      PHP_TZ: Europe/Madrid

  # Agent (active+passive) monitoring this workstation, linked to the Linux
  # template so it ships CPU/memory/disk/filesystem items + triggers out of the box.
  zabbix-agent:
    image: zabbix/zabbix-agent2:alpine-7.0-latest
    container_name: rootcause-zabbix-agent
    restart: unless-stopped
    depends_on: [zabbix-server]
    networks: [zabbix-net]
    privileged: true
    pid: host
    environment:
      ZBX_HOSTNAME: rootcause-workstation
      ZBX_SERVER_HOST: zabbix-server

volumes:
  prometheus_data:
  grafana_data:
  alertmanager_data:
  zabbix_db:

networks:
  zabbix-net:
    driver: bridge
