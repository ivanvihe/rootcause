server {
    listen 80;
    listen [::]:80;
    server_name rootcause.example.com rootcause.example.com;

    location /.well-known/acme-challenge/ {
        root /var/lib/letsencrypt;
    }

    location / {
        return 301 https://$host:8443$request_uri;
    }
}

server {
    listen 8543 ssl;
    listen [::]:8543 ssl;
    server_name rootcause.example.com;

    ssl_certificate /etc/letsencrypt/live/rootcause.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rootcause.example.com/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 8443;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
